# Production compose for Synology NAS deployment.
# Images are pre-built and loaded -- no build context needed.
#
# Usage on NAS:
#   docker compose -f docker-compose.prod.yml up -d

name: books

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - books-data:/var/lib/postgresql/data
    networks:
      - books-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  strapi:
    image: ${REGISTRY:-books}/strapi:${TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_ENV: production
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    networks:
      - books-net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${REGISTRY:-books}/frontend:${TAG:-latest}
    restart: unless-stopped
    networks:
      - books-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-9443}:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - books-net
    depends_on:
      - strapi
      - frontend

volumes:
  books-data:
  strapi-uploads:

networks:
  books-net:
    driver: bridge
