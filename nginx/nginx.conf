upstream strapi_upstream {
    server strapi:1337;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # ── Frontend ─────────────────────────────────────────────────
    # The SPA only needs: / (index.html) and /assets/* (JS, CSS, images).
    # Matching these explicitly keeps the frontend routes predictable
    # and lets everything else fall through to Strapi.

    location /assets/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend root — exact match only, so /admin, /api, etc. don't match
    location = / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend favicon / robots / manifest if present
    location = /favicon.ico {
        proxy_pass http://frontend_upstream;
    }

    # ── Strapi (everything else) ─────────────────────────────────
    # Covers: /admin, /api, /upload, /uploads, /content-manager,
    # /content-type-builder, /i18n, /users-permissions, /_health,
    # and any future plugin routes — no whitelist needed.

    location / {
        proxy_pass http://strapi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}